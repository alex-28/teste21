<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Musée VR: Nutrition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      const nutritionValues = {
        'food-steak': {p: 30, c: 0, v: 0},
        'food-egg': {p: 12, c: 0, v: 0},
        'food-fish': {p: 25, c: 0, v: 5},
        'food-bread': {p: 5, c: 50, v: 0},
        'food-tomato': {p: 1, c: 4, v: 20},
        'food-cucumber': {p: 1, c: 2, v: 15},
        'food-salad': {p: 2, c: 1, v: 25},
        'food-apple-green': {p: 0, c: 15, v: 15},
        'food-apple': {p: 0, c: 18, v: 10},
        'food-cheese': {p: 15, c: 2, v: 0},
        'food-cake': {p: 2, c: 70, v: 0},
        'food-oil': {p: 0, c: 0, v: 0},
        'food-water': {p: 0, c: 0, v: 5},
        'food-milk': {p: 8, c: 10, v: 5}
      };

      let currentP = 0, currentC = 0, currentV = 0;

      AFRAME.registerComponent('drag-nd-drop', {
        init: function () {
          this.isDragging = false;
          this.camera = document.querySelector('[camera]');
          this.platePos = new THREE.Vector3(0, 1.1, -4); 
          this.el.addEventListener('mousedown', () => { 
            this.isDragging = true; 
            if (this.el.components.sound) this.el.components.sound.playSound();
          });
          window.addEventListener('mouseup', () => { this.isDragging = false; });
        },
        tick: function () {
          if (this.isDragging && this.camera) {
            let direction = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.object3D.quaternion);
            let targetPos = new THREE.Vector3();
            this.camera.object3D.getWorldPosition(targetPos);
            targetPos.addScaledVector(direction, 2.5); 
            this.el.parentEl.object3D.worldToLocal(targetPos);
            if (this.el.object3D.position.distanceTo(this.platePos) < 1.8) {
              this.el.object3D.position.lerp(this.platePos, 0.15);
            } else { this.el.object3D.position.lerp(targetPos, 0.15); }
          }
        }
      });

      function launchConfetti() {
        const colors = ['#FFD700', '#FF69B4', '#00FF00', '#4CC3D9', '#FF4500'];
        for (let i = 0; i < 35; i++) {
          let p = document.createElement('a-sphere');
          p.setAttribute('radius', '0.05'); p.setAttribute('color', colors[Math.floor(Math.random() * colors.length)]);
          p.setAttribute('position', '0 1.2 -4');
          let dest = `${(Math.random()-0.5)*5} ${Math.random()*3+2} ${-4+(Math.random()-0.5)*5}`;
          p.setAttribute('animation', `property: position; to: ${dest}; dur: 1500; easing: easeOutQuad`);
          document.querySelector('a-scene').appendChild(p);
          setTimeout(() => p.remove(), 1500);
        }
      }

      function triggerBadEffect() {
        const flash = document.querySelector('#red-flash');
        const feed = document.querySelector('#feedback');
        document.querySelector('#fail-sound-entity').components.sound.playSound();
        flash.setAttribute('visible', 'true');
        flash.setAttribute('animation', 'property: material.opacity; from: 0.8; to: 0; dur: 1500');
        setTimeout(() => { flash.setAttribute('visible', 'false'); }, 1500);
        feed.setAttribute('animation__shake', 'property: position; from: 0 1.6 -4; to: 0.1 1.6 -4; dur: 50; loops: 10');
        setTimeout(() => { feed.removeAttribute('animation__shake'); feed.setAttribute('position', '0 1.6 -4'); }, 600);
      }

      window.addEventListener('DOMContentLoaded', () => {
        const cat = {
          protein: ['food-steak', 'food-egg', 'food-fish'],
          carbs: ['food-bread'],
          veggies: ['food-tomato', 'food-cucumber', 'food-salad'],
          fat_sugar: ['food-cake', 'food-oil', 'food-cheese', 'food-milk']
        };
        let selected = [];
        const fb = document.querySelector('#feedback');
        const counter = document.querySelector('#counter-display');

        document.querySelectorAll('.clickable').forEach(el => {
          el.addEventListener('click', function() {
            if (this.classList.contains('selected') || selected.length >= 4) return;
            this.classList.add('selected');
            this.emit('click-anim');
            selected.push(this.id);

            let val = nutritionValues[this.id];
            if (val) {
              currentP += val.p; currentC += val.c; currentV += val.v;
              counter.setAttribute('value', `PROTÉINES: ${currentP} | GLUCIDES: ${currentC} | VITAMINES: ${currentV}`);
              counter.setAttribute('visible', 'true');
            }

            if (selected.length === 4) {
              let p=0, c=0, v=0, f=0;
              selected.forEach(id => {
                if (cat.protein.includes(id)) p++; if (cat.carbs.includes(id)) c++;
                if (cat.veggies.includes(id)) v++; if (cat.fat_sugar.includes(id)) f++;
              });
              fb.setAttribute('visible', 'true');
              if (v >= 1 && p >= 1 && c >= 1 && f <= 1) {
                fb.setAttribute('value', "BRAVO! Assiette équilibrée!"); fb.setAttribute('color', "#00FF00"); launchConfetti();
              } else {
                fb.setAttribute('value', "ESSAYEZ ENCORE! Mauvais équilibre."); fb.setAttribute('color', "#FF0000"); triggerBadEffect();
              }
            }
          });
        });
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="room" src="https://i.imgur.com/hIRhIUQ.jpeg" crossorigin="anonymous">
        <audio id="click-sound" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3" crossorigin="anonymous"></audio>
        <audio id="fail-sound" src="https://cdn.aframe.io/speech-command-engine/sc-sounds/no.mp3" crossorigin="anonymous"></audio>
      </a-assets>

      <a-sphere radius="30" src="#room" material="side: double; shader: flat" rotation="0 90 0"></a-sphere>
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-entity id="fail-sound-entity" sound="src: #fail-sound; volume: 2"></a-entity>

      <a-entity position="-2.5 2.2 -3" rotation="0 35 0">
          <a-plane width="2.2" height="1.1" color="#111" opacity="0.85"></a-plane>
          <a-text value="ASSIETTE SANTÉ:\n1/2 Légumes\n1/4 Protéines\n1/4 Glucides\nÉvitez trop de graisses!" align="center" color="#FFF" width="2"></a-text>
      </a-entity>

      <a-text id="counter-display" value="PROTÉINES: 0 | GLUCIDES: 0 | VITAMINES: 0" position="0 2.1 -4" align="center" width="5" color="#00FFFF" visible="false" background="color: #111; opacity: 0.8"></a-text>
      
      <a-text id="feedback" value="" position="0 1.6 -4" align="center" width="6" visible="false" background="color: #111; opacity: 0.9"></a-text>

      <a-entity id="museum-collection" position="0 -1.5 0">
        <a-box position="0 0.9 -4" width="2.2" height="0.1" depth="1.5" color="#8B4513"></a-box>
        <a-cylinder position="0 1.0 -4" radius="0.6" height="0.05" color="white"></a-cylinder>

        <a-box id="food-steak" class="clickable" position="-0.7 1.1 -3.7" color="#A52A2A" width="0.3" height="0.1" depth="0.3" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: -0.2 1.1 -4; dur: 800; startEvents: click-anim"><a-text value="STEAK" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-box>
        <a-box id="food-bread" class="clickable" position="0.7 1.1 -3.7" color="#F4A460" width="0.3" height="0.2" depth="0.15" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.2 1.1 -4; dur: 800; startEvents: click-anim"><a-text value="PAIN" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-box>
        <a-sphere id="food-egg" class="clickable" position="-0.4 1.9 -4.2" radius="0.12" color="#FFFDD0" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0 1.1 -3.8; dur: 800; startEvents: click-anim"><a-text value="OEUF" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-sphere>
        <a-box id="food-fish" class="clickable" position="0.4 1.9 -4.2" color="#778899" width="0.4" height="0.1" depth="0.2" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0 1.1 -4.2; dur: 800; startEvents: click-anim"><a-text value="POISSON" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-box>
        <a-sphere id="food-tomato" class="clickable" position="-2.5 1.1 -3.8" radius="0.15" color="#FF0000" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: -0.1 1.1 -4.2; dur: 800; startEvents: click-anim"><a-text value="TOMATE" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-sphere>
        <a-box id="food-cucumber" class="clickable" position="-1.9 1.1 -3.8" color="#2E8B57" width="0.1" height="0.4" depth="0.1" rotation="0 0 45" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.1 1.1 -4.2; dur: 800; startEvents: click-anim"><a-text value="CONCOMBRE" position="0 0.5 0" align="center" width="2.5" color="black"></a-text></a-box>
        <a-cone id="food-salad" class="clickable" position="-2.4 1.9 -4.2" radius-bottom="0.15" height="0.3" color="#32CD32" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0 1.1 -3.9; dur: 800; startEvents: click-anim"><a-text value="SALADE" position="0 0.4 0" align="center" width="2.5" color="black"></a-text></a-cone>
        <a-sphere id="food-apple-green" class="clickable" position="-2.0 1.9 -4.2" radius="0.12" color="#7FFF00" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.2 1.1 -3.9; dur: 800; startEvents: click-anim"><a-text value="POMME VERTE" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-sphere>
        <a-sphere id="food-apple" class="clickable" position="1.9 1.1 -3.8" radius="0.15" color="#FF4500" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0 1.1 -4.1; dur: 800; startEvents: click-anim"><a-text value="POMME" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-sphere>
        <a-box id="food-cheese" class="clickable" position="2.5 1.1 -3.8" color="#FFD700" width="0.2" height="0.2" depth="0.2" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.2 1.1 -4.1; dur: 800; startEvents: click-anim"><a-text value="FROMAGE" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-box>
        <a-torus id="food-cake" class="clickable" position="2.0 1.9 -4.2" radius="0.08" radius-tubular="0.03" color="#FF69B4" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: -0.2 1.1 -4.1; dur: 800; startEvents: click-anim"><a-text value="DESSERT" position="0 0.3 0" align="center" width="2.5" color="black"></a-text></a-torus>
        <a-cone id="food-oil" class="clickable" position="2.4 1.9 -4.2" radius-bottom="0.1" height="0.4" color="#FFD700" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.1 1.1 -4.3; dur: 800; startEvents: click-anim"><a-text value="HUILE" position="0 0.5 0" align="center" width="2.5" color="black"></a-text></a-cone>
        <a-cylinder id="food-water" class="clickable" position="-2.5 1.2 -2.5" radius="0.1" height="0.4" color="#AEEEEE" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: -0.4 1.1 -4; dur: 800; startEvents: click-anim"><a-text value="EAU" position="0 0.4 0" align="center" width="2.5" color="black"></a-text></a-cylinder>
        <a-box id="food-milk" class="clickable" position="2.5 1.2 -2.5" width="0.2" height="0.4" depth="0.2" color="#FFF5EE" drag-nd-drop sound="src: #click-sound" animation__click="property: position; to: 0.4 1.1 -4; dur: 800; startEvents: click-anim"><a-text value="LAIT" position="0 0.4 0" align="center" width="2.5" color="black"></a-text></a-box>

        <a-box position="-2.2 0.9 -4" width="1.5" height="0.1" depth="1.5" color="#556B2F"></a-box>
        <a-box position="2.2 0.9 -4" width="1.5" height="0.1" depth="1.5" color="#B8860B"></a-box>
        <a-box position="-2.5 0.5 -2.5" width="0.6" height="1.0" depth="0.6" color="#4682B4"></a-box>
        <a-box position="2.5 0.5 -2.5" width="0.6" height="1.0" depth="0.6" color="#D8BFD8"></a-box>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor color="black"></a-cursor>
        <a-plane id="red-flash" position="0 0 -0.1" width="1" height="1" color="red" material="transparent: true; opacity: 0" visible="false"></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
